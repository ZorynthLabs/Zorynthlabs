<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zorynth Labs — Contact</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f5f5f5;
      background:
        radial-gradient(circle at 50% 20%, rgba(120,120,120,0.18), transparent 35%),
        linear-gradient(180deg, #030303, #0b0b0b);
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 8%;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      letter-spacing: 4px;
      font-weight: 700;
      font-size: 14px;
      color: white;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-links a {
      color: #d0d0d0;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px 24px;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.35);
      color: white;
    }

    .hero {
      padding: 50px 8% 50px;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }

    .logo-image {
      width: 180px;
      margin: 0 auto 22px auto;
      display: block;
      opacity: 0.96;
    }

    .label {
      color: #888;
      letter-spacing: 3px;
      font-size: 12px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(48px, 8vw, 88px);
      line-height: 1.05;
      margin: 22px 0;
      letter-spacing: -3px;
    }

    .hero p {
      max-width: 700px;
      margin: 0 auto;
      color: #b8b8b8;
      font-size: 19px;
      line-height: 1.7;
    }

    .contact-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 8% 90px;
    }

    .contact-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      border-radius: 28px;
      padding: 32px;
    }

    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .contact-links a {
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 16px;
      color: white;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      border: none;
      background: white;
      color: black;
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      width: fit-content;
    }

    footer {
      padding: 40px 8%;
      color: #777;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 700px) {
      nav {
        flex-direction: column;
        gap: 18px;
      }

      .nav-links a {
        font-size: 13px;
        padding: 10px 18px;
      }

      .hero {
        padding-top: 30px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">ZORYNTH LABS</a>

    <div class="nav-links">
      <a href="vision.html">Vision</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="hero">
    <img src="Zorynth_Labs__3_-removebg-preview.png" alt="Zorynth Labs Logo" class="logo-image">

    <div class="label">Contact</div>

    <h1>Connect with Zorynth Labs.</h1>

    <p>
      Reach out for collaborations, experimental projects, creative systems,
      or early conversations around AI-assisted digital creation.
    </p>
  </main>

  <section class="contact-wrap">
    <div class="contact-card">

      <div class="contact-links">
        <a href="https://instagram.com/zorynthlabs" target="_blank">Instagram</a>
        <a href="mailto:zorynthlabs@gmail.com">zorynthlabs@gmail.com</a>
      </div>

      <form action="https://formspree.io/f/mnjrzowg" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Message" required></textarea>
        <button type="submit">SEND MESSAGE</button>
      </form>

    </div>
  </section>

  <footer>
    © 2026 Zorynth Labs. Experimental creative technology.
  </footer>

</body>
</html>
